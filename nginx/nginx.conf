# BALS Stack - Nginx configuration for serving Tezzembals
# Proxies API/SSR to Axum backend, serves static assets directly

upstream axum_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    server_name localhost;
    root /var/www/tezzembals;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/wasm;
    gzip_min_length 256;

    # Static assets (WASM, JS, CSS) - served directly by nginx for performance
    location /pkg/ {
        alias /var/www/tezzembals/pkg/;
        add_header Cache-Control "public, max-age=31536000";
        # WASM MIME type
        types {
            application/wasm wasm;
        }
    }

    # Public assets
    location / {
        alias /var/www/tezzembals/;
        try_files $uri $uri/ @axum;
    }

    # Proxy all other requests to Axum (SSR, API, server functions)
    location @axum {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://axum_backend;
    }

    # WebSocket support (for future real-time features)
    location /ws {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_pass http://axum_backend;
    }
}

# BALS Stack - Nginx configuration for Themepark
# Proxies API/SSR to Axum backend, serves static assets directly

upstream axum_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    server_name mywebsitesareathemepark.com www.mywebsitesareathemepark.com;
    root /var/www/themepark;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/wasm;
    gzip_min_length 256;

    # Static assets (WASM, JS, CSS) - served directly by nginx for performance
    # Uses default mime.types (text/css, application/wasm, application/javascript)
    location /pkg/ {
        add_header Cache-Control "public, max-age=31536000";
    }

    # Root and non-static paths - proxy to Axum (SSR)
    location = / {
        proxy_pass http://axum_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets first, then proxy to Axum
    location / {
        try_files $uri $uri/ @axum;
    }

    # Proxy all other requests to Axum (SSR, API, server functions)
    location @axum {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://axum_backend;
    }

    # WebSocket support (for future real-time features)
    location /ws {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_pass http://axum_backend;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/mywebsitesareathemepark.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/mywebsitesareathemepark.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}


server {
    if ($host = www.mywebsitesareathemepark.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = mywebsitesareathemepark.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name mywebsitesareathemepark.com www.mywebsitesareathemepark.com;
    return 404; # managed by Certbot




}
# BALS Stack - Nginx configuration for Themepark
# Serves static files (WASM, JS, CSS, assets) directly; proxies dynamic/SSR to Axum
# Update root/alias paths if project location differs
# For no-sudo deploy: ensure nginx can read project dir (chmod o+x /home/jhs /home/jhs/themepark)

upstream axum_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    server_name mywebsitesareathemepark.com www.mywebsitesareathemepark.com;

    # Static: WASM, JS, CSS - aggressive caching, gzip
    location /pkg/ {
        alias /home/jhs/themepark/target/site/pkg/;
        gzip on;
        gzip_types application/javascript application/wasm text/css;
        gzip_min_length 256;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Static: favicon.svg, public assets (favicon.ico -> Axum for redirect)
    location ~ ^/(favicon\.svg|[^/]+\.(ico|svg|png|jpg|jpeg|gif|webp))$ {
        root /home/jhs/themepark/target/site;
        add_header Cache-Control "public, max-age=86400";
    }

    # Dynamic: SSR, Leptos routes, API - proxy to Axum
    location / {
        proxy_pass http://axum_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_pass http://axum_backend;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/mywebsitesareathemepark.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/mywebsitesareathemepark.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.mywebsitesareathemepark.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = mywebsitesareathemepark.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name mywebsitesareathemepark.com www.mywebsitesareathemepark.com;
    return 404; # managed by Certbot
}
